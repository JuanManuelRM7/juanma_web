  aboutme:
    title: Sobre mí
    icon: fas fa-user
    description: Soy un apasionado de la física y las matemáticas, con un gran interés en el cambio climático. Esta preocupación me ha llevado a sentir una especial afinidad por áreas como la meteorología y las energías renovables. Actualmente trabajo en VRAIA Corp., donde desarrollamos, entre muchas otras cosas, soluciones de deep learning para la industria del neumático.
  experience:
    title: Experiencia
    icon: fas fa-briefcase
    panelId: experience-panel
    list:

      - position: AI Developer
        dates: Junio 2025 - *Presente*
        company: VRAIA Corp.
        url: "https://vraia.com/"
        details: |1-
            - Desarrollo de pipelines de extracción, transformación y carga (ETL) para bases de datos, creación de datasets y preprocesamiento de imágenes.
            - Entrenamiento, fine-tuning y validación de modelos de visión, orientados a la detección de defectos en neumáticos.
            - Diseño e implementación de algoritmos de aprendizaje automático personalizados para distintos proyectos de visión artificial.
            - Definición, análisis y seguimiento de métricas de desempeño para la selección de modelos en producción.
            - Redacción y revisión de documentación técnica.
            - Investigación y actualización constante en avances de inteligencia artificial.
            - Colaboración interdisciplinaria para alcanzar los objetivos del proyecto.
      - position: Data Scientist & AI Researcher
        dates: Junio 2024 - Junio 2025
        company: AIR Institute & Grupo de Investigación BISITE
        url: "https://www.air-institute.org/"
        details: |1-
            - Analizar y definir los requisitos del proyecto, diseñando y desarrollando soluciones de aprendizaje automático utilizando algoritmos de vanguardia.
            - Diseñar e implementar algoritmos de aprendizaje automático personalizados para una variedad de proyectos, incluyendo procesamiento del lenguaje natural, redes neuronales y visión computacional, entre otros.
            - Mantenerse al día con los últimos avances en investigación en diversos campos de la inteligencia artificial.
            - Escribir y revisar documentación técnica.
            - Reunirse con los clientes para comprender sus requisitos y adaptar las soluciones a sus necesidades.
            - Colaborar con otros miembros del equipo para lograr los objetivos del proyecto.
      - position: Investigador en Universidad Miguel Hernández
        dates: Enero 2024 - Julio 2024
        url: "#"
        company: Grupo SCOLAb
        url: "https://seneca.umh.es/"
        details: |1-
            - Desarrollo e investigación de técnicas Lagrangianas para la identificación automática de situaciones de bloqueo atmosférico.
            - Colaboración en otros proyectos del grupo relacionados con la física atmosférica.
