{{- $blog := where .Site.RegularPages "Section" "blog" -}}
{{- $latest := index (sort $blog "Date" "desc") 0 -}}
{{- if $latest -}}
<!-- Latest Post Chip -->
<a
  href="{{ $latest.RelPermalink }}"
  class="group inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-emerald-500/50 dark:border-emerald-400/50 bg-white/80 dark:bg-slate-800/80 hover:bg-emerald-50 dark:hover:bg-slate-700 transition-all duration-200 hover:shadow-sm no-underline"
>
  <i class="fas fa-newspaper text-emerald-600 dark:text-emerald-300 text-sm"></i>
  <span class="font-medium text-gray-900 dark:text-gray-100">{{ $latest.Title | truncate 30 }}</span>
  <i class="fas fa-arrow-right text-emerald-600 dark:text-emerald-300 text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
</a>
{{- end -}}
