{{- $blog := where .Site.RegularPages "Section" "blog" -}}
{{- $latest := index (sort $blog "Date" "desc") 0 -}}
{{- if $latest -}}
<!-- Latest Post Chip -->
<a
  href="{{ $latest.RelPermalink }}"
  class="inline-flex items-center gap-2 px-4 py-2 rounded-md border border-emerald-500/50 dark:border-emerald-400/50 bg-white/80 dark:bg-slate-800/80 hover:bg-emerald-50 dark:hover:bg-slate-700 transition-all duration-300 hover:scale-105 hover:shadow-md no-underline max-w-full"
>
  <i class="fas fa-newspaper text-emerald-600 dark:text-emerald-300 text-sm flex-shrink-0"></i>
  <span class="font-medium text-gray-900 dark:text-gray-100 truncate">{{ $latest.Title }}</span>
</a>
{{- end -}}
