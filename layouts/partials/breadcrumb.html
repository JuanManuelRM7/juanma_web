{{ if and (not .IsHome) (.IsPage) }}
<nav aria-label="Miga de pan" class="text-sm text-gray-500 dark:text-gray-400 mb-4 flex items-center gap-1.5 flex-wrap">
  <a href="{{ .Site.BaseURL }}" class="hover:text-cyan-600 dark:hover:text-cyan-300 transition-colors" aria-label="Inicio">
    <i class="fas fa-home text-xs"></i>
  </a>
  {{ with .Parent }}
  <span class="text-gray-300 dark:text-gray-600" aria-hidden="true">/</span>
  <a href="{{ .RelPermalink }}" class="hover:text-cyan-600 dark:hover:text-cyan-300 transition-colors capitalize">{{ .Title }}</a>
  {{ end }}
  <span class="text-gray-300 dark:text-gray-600" aria-hidden="true">/</span>
  <span class="text-gray-700 dark:text-gray-300 font-medium truncate max-w-[220px] sm:max-w-xs" aria-current="page">{{ .Title }}</span>
</nav>
{{ end }}
