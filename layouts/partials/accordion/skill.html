<script>
  document.addEventListener("DOMContentLoaded", function() {
    let skillBars = document.querySelectorAll("#skill-percent");
    skillBars.forEach(elem => {
      elem.style.width = elem.classList[0];
    });
  });
</script>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2.5 mt-3">
{{ range.Site.Params.skill.list }}
  <a href="{{ .url }}" target="_blank" rel="noopener noreferrer" class="skill-badge block px-4 py-2 rounded-lg text-center text-sm font-medium text-white dark:text-gray-900 shadow hover:shadow-lg transition-all duration-300 hover:scale-105 hover:no-underline break-words" style="background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);">
    {{ .skill }}
    {{ with .skillrating }}
    <div class="w-full mt-1.5 bg-white/30 rounded-full" style="height: 0.25rem;">
      <div id="skill-percent" class="{{ . }}% bg-white h-full rounded-full" style="width: 0; transition: all 0.5s;"></div>
    </div>
    {{ end }}
  </a>
{{ end }}
</div>
