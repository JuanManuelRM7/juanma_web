<script>
  document.addEventListener("DOMContentLoaded", function() {
    let skillBars = document.querySelectorAll("#skill-percent");
    skillBars.forEach(elem => {
      elem.style.width = elem.classList[0];
    });
  });
</script>
<div class="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
{{ range.Site.Params.skill.list }}
  <div class="skill-badge px-4 py-2 rounded-lg text-center font-medium text-white shadow-md transition-all duration-300 hover:scale-105 hover:shadow-lg" style="background: linear-gradient(135deg, #059669 0%, #10b981 50%, #34d399 100%);">
    {{ .skill }}
    {{ with .skillrating }}
    <div class="w-full mt-2 bg-white/30 rounded-full" style="height: 0.375rem;">
      <div id="skill-percent" class="{{ . }}% bg-white h-full rounded-full" style="width: 0; transition: all 0.5s;"></div>
    </div>
    {{ end }}
  </div>
{{ end }}
</div>
