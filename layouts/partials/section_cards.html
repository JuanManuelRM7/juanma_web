<div class="hidden md:grid grid-cols-1 gap-3 mb-3">
  <!-- Experiencia Card -->
  <button
    type="button"
    onclick="openPanelById('experience-panel')"
    class="text-left group w-full rounded-lg border border-emerald-500/70 dark:border-emerald-400/70 bg-gradient-to-br from-white via-emerald-50/50 to-white dark:from-slate-800 dark:via-slate-800/60 dark:to-slate-900 p-4 hover:shadow-md transition-all duration-200 hover:translate-y-[-2px]"
  >
    <div class="flex items-center gap-3">
      <i class="fas fa-briefcase text-emerald-600 dark:text-emerald-300 text-xl"></i>
      <h3 class="m-0 text-lg font-semibold text-gray-900 dark:text-gray-100">Experiencia</h3>
    </div>
    <p class="m-0 mt-2 text-sm text-gray-700 dark:text-gray-300">
      Lo que he hecho recientemente y en dónde.
    </p>
    <span class="inline-flex items-center gap-1 mt-3 text-sm text-emerald-700 dark:text-emerald-300">
      Ver más <i class="fas fa-arrow-right transition-transform group-hover:translate-x-1"></i>
    </span>
  </button>

  <!-- Educación Card -->
  <button
    type="button"
    onclick="openPanelById('education-panel')"
    class="text-left group w-full rounded-lg border border-emerald-500/70 dark:border-emerald-400/70 bg-gradient-to-br from-white via-emerald-50/50 to-white dark:from-slate-800 dark:via-slate-800/60 dark:to-slate-900 p-4 hover:shadow-md transition-all duration-200 hover:translate-y-[-2px]"
  >
    <div class="flex items-center gap-3">
      <i class="fas fa-graduation-cap text-emerald-600 dark:text-emerald-300 text-xl"></i>
      <h3 class="m-0 text-lg font-semibold text-gray-900 dark:text-gray-100">Educación</h3>
    </div>
    <p class="m-0 mt-2 text-sm text-gray-700 dark:text-gray-300">
      Dónde he estudiado y mi formación.
    </p>
    <span class="inline-flex items-center gap-1 mt-3 text-sm text-emerald-700 dark:text-emerald-300">
      Ver más <i class="fas fa-arrow-right transition-transform group-hover:translate-x-1"></i>
    </span>
  </button>
</div>
