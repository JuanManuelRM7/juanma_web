<div class="hidden md:flex gap-2 mb-2 text-xs">
  <!-- Experiencia Chip -->
  <button
    type="button"
    onclick="openPanelById('experience-panel')"
    class="group inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-emerald-500/50 dark:border-emerald-400/50 bg-white/80 dark:bg-slate-800/80 hover:bg-emerald-50 dark:hover:bg-slate-700 transition-all duration-200 hover:shadow-sm"
  >
    <i class="fas fa-briefcase text-emerald-600 dark:text-emerald-300 text-sm"></i>
    <span class="font-medium text-gray-900 dark:text-gray-100">Experiencia</span>
    <i class="fas fa-arrow-right text-emerald-600 dark:text-emerald-300 text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
  </button>

  <!-- Educación Chip -->
  <button
    type="button"
    onclick="openPanelById('education-panel')"
    class="group inline-flex items-center gap-1.5 px-3 py-1.5 rounded-md border border-emerald-500/50 dark:border-emerald-400/50 bg-white/80 dark:bg-slate-800/80 hover:bg-emerald-50 dark:hover:bg-slate-700 transition-all duration-200 hover:shadow-sm"
  >
    <i class="fas fa-graduation-cap text-emerald-600 dark:text-emerald-300 text-sm"></i>
    <span class="font-medium text-gray-900 dark:text-gray-100">Educación</span>
    <i class="fas fa-arrow-right text-emerald-600 dark:text-emerald-300 text-xs opacity-0 group-hover:opacity-100 transition-opacity"></i>
  </button>
</div>
