<footer class="text-sm text-center border-t-2 border-emerald-500 dark:border-emerald-400 {{ if .IsHome }} bg-transparent rounded-b-none py-2 {{ else }} py-6 bg-gradient-to-r from-transparent via-emerald-50/50 to-transparent dark:from-transparent dark:via-slate-800/50 dark:to-transparent {{ end }}"
  {{ if not .IsHome }}style="box-shadow: 0 -4px 6px -1px rgba(5, 150, 105, 0.1);"{{ end }}>
  <p class="markdownify">{{ .Site.Params.copyright | markdownify }}</p>
  <p class="text-xs text-gray-500 dark:text-gray-500">
    <i>Diseñado por</i>
    <a href="https://github.com/JuanManuelRM7" class="hover:text-emerald-600 dark:hover:text-emerald-400">
      JM
    </a>
  </p>

  {{ if .Site.Params.theme.singlePage }}
  <i
class="fas fa-sun theme-toggle text-emerald-600 hover:text-emerald-800 dark:text-emerald-300 dark:hover:text-emerald-400 cursor-pointer text-lg mr-9 sm:mr-0 transition-all duration-300 hover:scale-110"
onclick="lightDark(this)"
></i>
{{ partial "toggleTheme.html" . }}
{{ end }}
</footer>
