<div class="not-prose mt-10 pt-6 border-t border-gray-200 dark:border-gray-700">
  <h3 class="text-lg font-semibold text-gray-800 dark:text-gray-200 mb-6 flex items-center gap-2">
    <i class="fas fa-comments text-cyan-600 dark:text-cyan-400"></i>
    Comentarios
  </h3>
  <script src="https://giscus.app/client.js"
          data-repo="JuanManuelRM7/juanma_web"
          data-repo-id="R_kgDOOBoH0g"
          data-category="Announcements"
          data-category-id="DIC_kwDOOBoH0s4C4Sl5"
          data-mapping="pathname"
          data-strict="0"
          data-reactions-enabled="1"
          data-emit-metadata="0"
          data-input-position="bottom"
          data-theme="preferred_color_scheme"
          data-lang="es"
          crossorigin="anonymous"
          async>
  </script>
  <script>
    // Sync Giscus theme with site theme toggle
    new MutationObserver(function () {
      var isDark = document.documentElement.classList.contains('dark');
      var iframe = document.querySelector('iframe.giscus-frame');
      if (!iframe) return;
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: isDark ? 'dark' : 'light' } } },
        'https://giscus.app'
      );
    }).observe(document.documentElement, { attributes: true, attributeFilter: ['class'] });
  </script>
</div>
