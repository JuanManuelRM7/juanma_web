<div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
  {{ range .Site.Params.project.list }}
  <div class="project-card group">
    <!-- Icon Header -->
    <div class="flex items-start justify-between mb-3">
      <div class="project-card-icon bg-{{ .color }}-100 dark:bg-{{ .color }}-900/30 text-{{ .color }}-600 dark:text-{{ .color }}-400">
        <i class="{{ .icon }} text-lg"></i>
      </div>
      {{ if .status }}
      <span class="text-[10px] font-semibold px-2 py-0.5 rounded-full
        {{ if eq .status "En producción" }}bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400
        {{ else if eq .status "Publicado" }}bg-violet-100 text-violet-700 dark:bg-violet-900/30 dark:text-violet-400
        {{ else if eq .status "Activo" }}bg-cyan-100 text-cyan-700 dark:bg-cyan-900/30 dark:text-cyan-400
        {{ else }}bg-amber-100 text-amber-700 dark:bg-amber-900/30 dark:text-amber-400
        {{ end }}">
        {{ .status }}
      </span>
      {{ end }}
    </div>

    <!-- Title -->
    <h4 class="font-bold text-gray-900 dark:text-gray-100 text-sm mb-2 leading-snug">
      {{ if .url }}<a href="{{ .url }}" class="no-underline hover:text-cyan-600 dark:hover:text-cyan-400" {{ if hasPrefix .url "http" }}target="_blank" rel="noopener noreferrer"{{ end }}>{{ .title }}</a>{{ else }}{{ .title }}{{ end }}
    </h4>

    <!-- Description -->
    <p class="text-xs text-gray-600 dark:text-gray-400 leading-relaxed mb-3">{{ .description }}</p>

    <!-- Tech Tags -->
    {{ if .tech }}
    <div class="flex flex-wrap gap-1.5 mt-auto">
      {{ range .tech }}
      <span class="text-[10px] font-medium px-2 py-0.5 rounded-md bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-gray-300">{{ . }}</span>
      {{ end }}
    </div>
    {{ end }}

    <!-- Link arrow -->
    {{ if .url }}
    <div class="mt-3 text-right">
      <a href="{{ .url }}" class="text-xs text-cyan-600 dark:text-cyan-400 no-underline hover:text-cyan-800 dark:hover:text-cyan-300 font-medium" {{ if hasPrefix .url "http" }}target="_blank" rel="noopener noreferrer"{{ end }}>
        <span data-i18n="action_view_more">Ver más</span> <i class="fas fa-arrow-right text-[10px] ml-1 transition-transform group-hover:translate-x-1" aria-hidden="true"></i>
      </a>
    </div>
    {{ end }}
  </div>
  {{ end }}
</div>
