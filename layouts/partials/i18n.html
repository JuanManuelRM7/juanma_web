  };

  // Make translations globally available
  window.__i18n = translations;

  function applyLang(lang) {
    var strings = translations[lang];
    if (!strings) return;
    document.querySelectorAll('[data-i18n]').forEach(function(el) {
      var key = el.getAttribute('data-i18n');
      if (strings[key]) {
        if (el.hasAttribute('data-i18n-html')) {
          el.innerHTML = strings[key];
        } else {
          el.textContent = strings[key];
        }
      }
    });
    // Also translate aria-labels
    document.querySelectorAll('[data-i18n-aria]').forEach(function(el) {
      var key = el.getAttribute('data-i18n-aria');
      if (strings[key]) el.setAttribute('aria-label', strings[key]);
    });
    var label = document.getElementById('lang-label');
    if (label) label.textContent = lang === 'es' ? 'EN' : 'ES';
    window.localStorage.setItem('lang', lang);
    document.documentElement.setAttribute('lang', lang);

    // Update clock if present
    if (typeof window.updateClock === 'function') window.updateClock();
  }

  window.applyLang = applyLang;

  window.toggleLang = function() {
    var current = window.localStorage.getItem('lang') || 'es';
    applyLang(current === 'es' ? 'en' : 'es');
  };

  window.getI18n = function(key) {
    var lang = window.localStorage.getItem('lang') || 'es';
    return (translations[lang] && translations[lang][key]) || key;
  };

  // Apply saved language on load
  var saved = window.localStorage.getItem('lang');
  if (saved && saved !== 'es') {
    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', function() { applyLang(saved); });
    } else {
      applyLang(saved);
    }
  }
})();
</script>
