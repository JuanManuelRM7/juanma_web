<div id="experience-stats">
  <p class="text-lg font-bold text-cyan-600 dark:text-cyan-400">
    <span id="total-experience">...</span>
  </p>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  var display = document.getElementById('total-experience');

  var experiences = [
    { start: 'Junio 2025', end: 'Presente' },
    { start: 'Junio 2024', end: 'Junio 2025' },
    { start: 'Enero 2024', end: 'Julio 2024' }
  ];

  var meses = {
    'enero': 1, 'febrero': 2, 'marzo': 3, 'abril': 4,
    'mayo': 5, 'junio': 6, 'julio': 7, 'agosto': 8,
    'septiembre': 9, 'octubre': 10, 'noviembre': 11, 'diciembre': 12
  };

  function parseDate(dateStr) {
    dateStr = dateStr.trim().toLowerCase();
    if (/^\d{4}$/.test(dateStr)) return new Date(parseInt(dateStr), 0, 1);
    var parts = dateStr.split(/\s+/);
    if (parts.length >= 2) {
      var month = meses[parts[0]] || 1;
      var year = parseInt(parts[1]);
      return new Date(year, month - 1, 1);
    }
    return new Date();
  }

  var now = new Date();
  var earliestDate = now;
  var latestDate = now;
  experiences.forEach(function(exp) {
    var startDate = parseDate(exp.start);
    var endDate = exp.end.indexOf('Presente') !== -1 ? now : parseDate(exp.end);
    if (startDate < earliestDate) earliestDate = startDate;
    if (endDate > latestDate) latestDate = endDate;
  });

  var totalMonths = (latestDate.getFullYear() - earliestDate.getFullYear()) * 12;
  totalMonths += latestDate.getMonth() - earliestDate.getMonth();
  if (latestDate.getDate() < earliestDate.getDate()) totalMonths -= 1;
  totalMonths = Math.max(1, totalMonths);

  function updateDisplay() {
    var lang = (window.localStorage && window.localStorage.getItem('lang')) || 'es';
    var years = Math.floor(totalMonths / 12);
    var months = totalMonths % 12;
    var yWord, mWord, andWord;
    if (lang === 'en') {
      yWord = years === 1 ? 'year' : 'years';
      mWord = months === 1 ? 'month' : 'months';
      andWord = 'and';
    } else {
      yWord = years === 1 ? 'año' : 'años';
      mWord = months === 1 ? 'mes' : 'meses';
      andWord = 'y';
    }
    if (years === 0) {
      display.textContent = months + ' ' + mWord;
    } else if (months === 0) {
      display.textContent = years + ' ' + yWord;
    } else {
      display.textContent = years + ' ' + yWord + ' ' + andWord + ' ' + months + ' ' + mWord;
    }
  }

  updateDisplay();
  window.updateExperienceDisplay = updateDisplay;
});
</script>
