<div class="w-full p-3 pb-1 flex justify-center align-middle profile-photo-container">
  <!-- Flip card container -->
  <div class="flip-card cursor-pointer" onclick="this.classList.toggle('flipped')">
    <div class="flip-card-inner">
      <!-- Front: Photo -->
      <div class="flip-card-front">
        <div class="relative group">
          <!-- Soft oval shadow under the photo -->
          <div class="absolute left-1/2 -translate-x-1/2 -bottom-3 w-9/12 h-5 rounded-full bg-black/25 dark:bg-black/50 blur-xl transition-all duration-300 group-hover:w-10/12 group-hover:h-6 group-hover:-bottom-4"></div>
          <img
            class="relative z-10 rounded-lg border-4 border-black transform-gpu transition-all duration-300 ease-out shadow-xl group-hover:-translate-y-1 group-hover:shadow-2xl w-full h-auto"
            src="{{ `images` | relURL }}/{{ .Site.Params.profile.photo }}"
            alt="{{ .Site.Params.author }}"
          />
        </div>
      </div>
      <!-- Back: About me text -->
      <div class="flip-card-back">
        <div class="bg-gradient-to-br from-cyan-50 via-white to-cyan-100 dark:from-slate-700 dark:via-slate-800 dark:to-slate-900 rounded-lg border-4 border-cyan-500 dark:border-cyan-400 p-3 shadow-xl h-full flex flex-col justify-center overflow-y-auto">
          <h3 class="text-base font-bold text-cyan-700 dark:text-cyan-300 mb-2 text-center flex-shrink-0">
            <i class="fas fa-user mr-1 text-sm"></i>{{ .Site.Params.aboutme.title }}
          </h3>
          <p class="text-xs text-gray-700 dark:text-gray-200 leading-snug text-justify">
            {{ .Site.Params.aboutme.description }}
          </p>
        </div>
      </div>
    </div>
  </div>
</div>

<style>
/* Flip card styles */
.flip-card {
  background-color: transparent;
  perspective: 1000px;
  width: 100%;
  max-width: 280px;
}

.flip-card-inner {
  position: relative;
  width: 100%;
  min-height: 280px;
  max-height: 320px;
  transition: transform 0.6s;
  transform-style: preserve-3d;
}

.flip-card.flipped .flip-card-inner {
  transform: rotateY(180deg);
}

.flip-card-front,
.flip-card-back {
  width: 100%;
  height: 100%;
  position: absolute;
  top: 0;
  left: 0;
  -webkit-backface-visibility: hidden;
  backface-visibility: hidden;
}

.flip-card-front {
  z-index: 2;
  transform: rotateY(0deg);
}

.flip-card-back {
  transform: rotateY(180deg);
}

/* Match height to the actual image */
.flip-card-front img {
  display: block;
}

.flip-card-back > div {
  height: 100%;
}
</style>
