<header
  class="nav px-4 pt-3 mb-6 w-full bg-gradient-to-r from-transparent via-cyan-50 to-transparent dark:from-transparent dark:via-slate-800 dark:to-transparent relative"
  style="box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.1);"
  role="banner"
>
  <!-- MÓVIL: fila con 5 elementos equiespaciados + borde inferior -->
  <nav class="flex justify-evenly items-center pb-3 border-b-2 border-cyan-500 dark:border-cyan-400 md:hidden" aria-label="Navegación principal">
    <a class="nav-menu-item !p-1 !px-2" href="{{ .Site.BaseURL }}"><span data-i18n="nav_home">Inicio</span></a>
    <a class="nav-menu-item !p-1 !px-2" href="{{ `blog` | relURL }}"><span data-i18n="nav_blog">Blog</span></a>
    <a class="nav-menu-item !p-1 !px-2" href="{{ `material` | relURL }}"><span data-i18n="nav_material">Material</span></a>
    <a href="{{ `search` | relURL }}" class="text-cyan-600 hover:text-cyan-800 dark:text-cyan-300 dark:hover:text-cyan-400 cursor-pointer text-lg transition-all duration-300 hover:scale-110 p-1" data-i18n-aria="nav_search" aria-label="Buscar">
      <i class="fas fa-search" aria-hidden="true"></i>
    </a>
    <button
      class="fas fa-globe text-cyan-600 hover:text-cyan-800 dark:text-cyan-300 dark:hover:text-cyan-400 cursor-pointer text-lg transition-all duration-300 hover:scale-110 p-1 bg-transparent border-none"
      onclick="toggleLang()"
      aria-label="Cambiar idioma"
      data-i18n-aria="aria_toggle_lang"
    ></button>
    <i
      class="fas fa-sun theme-toggle text-cyan-600 hover:text-cyan-800 dark:text-cyan-300 dark:hover:text-cyan-400 cursor-pointer text-lg transition-all duration-300 hover:scale-110 p-1"
      onclick="toggleTheme()"
      role="button"
      tabindex="0"
      aria-label="Cambiar tema"
      data-i18n-aria="aria_toggle_theme"
      onkeydown="if(event.key==='Enter'||event.key===' ')toggleTheme()"
    ></i>
  </nav>

  <!-- MÓVIL: píldora de fecha/hora que sobresale del borde inferior -->
  <div class="flex md:hidden justify-center -mt-[13px] mb-2 relative z-10">
    <div id="clock-mobile"
      class="text-cyan-700 dark:text-cyan-300 text-xs font-semibold tracking-wide
             bg-white dark:bg-slate-900
             border border-cyan-400 dark:border-cyan-500
             rounded-full px-4 py-0.5 shadow-sm
             flex items-center gap-2"
      aria-live="off" aria-label="Reloj">
    </div>
  </div>

  <!-- DESKTOP: grid 3 columnas + borde inferior en el header -->
  <nav class="hidden md:grid md:grid-cols-3 items-center pb-3 border-b-2 border-cyan-500 dark:border-cyan-400" aria-label="Navegación principal">
    <div class="flex gap-1 items-center">
      <a class="nav-menu-item" href="{{ .Site.BaseURL }}"><span data-i18n="nav_home">Inicio</span></a>
      <a class="nav-menu-item" href="{{ `blog` | relURL }}"><span data-i18n="nav_blog">Blog</span></a>
      <a class="nav-menu-item" href="{{ `material` | relURL }}"><span data-i18n="nav_material_desktop">Material Universitario</span></a>
    </div>
    <div class="flex justify-center">
      <div id="clock" class="text-cyan-700 dark:text-cyan-300 font-semibold text-lg text-center" aria-live="off" aria-label="Reloj"></div>
    </div>
    <div class="flex items-center justify-end gap-3">
      <a href="{{ `search` | relURL }}" class="text-cyan-600 hover:text-cyan-800 dark:text-cyan-300 dark:hover:text-cyan-400 cursor-pointer text-lg transition-all duration-300 hover:scale-110 p-1" data-i18n-aria="nav_search" aria-label="Buscar">
        <i class="fas fa-search" aria-hidden="true"></i>
      </a>
      <!-- Language Toggle -->
      <button id="lang-toggle" onclick="toggleLang()" class="px-2.5 py-1 rounded-full text-xs font-bold bg-cyan-100 hover:bg-cyan-200 dark:bg-slate-700 dark:hover:bg-slate-600 text-cyan-700 dark:text-cyan-300 border border-cyan-300 dark:border-cyan-600 transition-all duration-300 hover:scale-105 cursor-pointer" aria-label="Cambiar idioma" data-i18n-aria="aria_toggle_lang">
        <span id="lang-label">EN</span> <i class="fas fa-globe ml-0.5" aria-hidden="true"></i>
      </button>
      <i
        class="fas fa-sun theme-toggle text-cyan-600 hover:text-cyan-800 dark:text-cyan-300 dark:hover:text-cyan-400 cursor-pointer text-lg transition-all duration-300 hover:scale-110 p-1"
        onclick="toggleTheme()"
        role="button"
        tabindex="0"
        aria-label="Cambiar tema"
        data-i18n-aria="aria_toggle_theme"
        onkeydown="if(event.key==='Enter'||event.key===' ')toggleTheme()"
      ></i>
    </div>
  </nav>
</header>

<script>
  window.updateClock = function() {
    var now = new Date();
    var hours = String(now.getHours()).padStart(2, '0');
    var minutes = String(now.getMinutes()).padStart(2, '0');
    var seconds = String(now.getSeconds()).padStart(2, '0');

    var day = now.getDate();
    var monthNum = String(now.getMonth() + 1).padStart(2, '0');
    var lang = window.localStorage.getItem('lang') || 'es';
    var t = (window.__i18n && window.__i18n[lang]) || {};
    var monthName = t['month_' + now.getMonth()] || ['enero','febrero','marzo','abril','mayo','junio','julio','agosto','septiembre','octubre','noviembre','diciembre'][now.getMonth()];
    var year = now.getFullYear();

    var fmt = t['clock_format'] || '{day} de {month} de {year}';
    var dateStr = fmt.replace('{day}', day).replace('{month}', monthName).replace('{year}', year);

    var clockEl = document.getElementById('clock');
    if (clockEl) {
      clockEl.innerHTML = '<div>' + dateStr + '</div><div>' + hours + ':' + minutes + ':' + seconds + '</div>';
    }

    var clockMobile = document.getElementById('clock-mobile');
    if (clockMobile) {
      clockMobile.innerHTML = '<span>' + day + '/' + monthNum + '/' + year + '</span><span class="text-cyan-300 dark:text-cyan-600 mx-0.5">\u00b7</span><span>' + hours + ':' + minutes + ':' + seconds + '</span>';
    }
  };

  window.updateClock();
  setInterval(window.updateClock, 1000);
  window.addEventListener('resize', window.updateClock);
</script>
