<header
  class="nav flex flex-row row py-3 px-4 mb-6 w-full border-b-2 border-emerald-500 dark:border-emerald-400 justify-between items-center bg-gradient-to-r from-transparent via-emerald-50 to-transparent dark:from-transparent dark:via-slate-800 dark:to-transparent"
  style="box-shadow: 0 4px 6px -1px rgba(5, 150, 105, 0.1);"
>
  <div class="flex gap-1">
    <a class="nav-menu-item" href="{{ .Site.BaseURL }}">Inicio</a>
    <a class="nav-menu-item" href="{{ `blog` | relURL }}">Blog</a>
    <a class="nav-menu-item hidden md:block" href="{{ `material` | relURL }}">Material Universitario</a>
  </div>
  <div class="absolute left-1/2 transform -translate-x-1/2">
    <div id="clock" class="text-emerald-700 dark:text-emerald-300 font-semibold text-base md:text-lg"></div>
  </div>
  <div class="flex items-center">
    <a class="nav-menu-item md:hidden !p-1 !px-2 ml-6 mr-3" href="{{ `material` | relURL }}">Material</a>
    <i
      class="fas fa-sun theme-toggle text-emerald-600 hover:text-emerald-800 dark:text-emerald-300 dark:hover:text-emerald-400 cursor-pointer text-lg transition-all duration-300 hover:scale-110"
      onclick="toggleTheme()"
    ></i>
  </div>
</header>

<script>
  function updateClock() {
    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const minutes = String(now.getMinutes()).padStart(2, '0');
    const seconds = String(now.getSeconds()).padStart(2, '0');
    
    const day = now.getDate();
    const monthNum = String(now.getMonth() + 1).padStart(2, '0');
    const months = ['enero', 'febrero', 'marzo', 'abril', 'mayo', 'junio', 
                    'julio', 'agosto', 'septiembre', 'octubre', 'noviembre', 'diciembre'];
    const monthName = months[now.getMonth()];
    const year = now.getFullYear();
    
    // Formato corto para móvil, largo para desktop
    const isMobile = window.innerWidth < 768;
    const dateStr = isMobile ? `${day}/${monthNum}/${year}` : `${day} de ${monthName} de ${year}`;
    
    const clockElement = document.getElementById('clock');
    if (clockElement) {
      clockElement.innerHTML = `<div class="text-center"><div class="text-xs md:text-base">${dateStr}</div><div>${hours}:${minutes}:${seconds}</div></div>`;
    }
  }
  
  // Update clock immediately and then every second
  updateClock();
  setInterval(updateClock, 1000);
  
  // Update format on window resize
  window.addEventListener('resize', updateClock);
</script>
