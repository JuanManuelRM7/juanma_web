{{ define "main" }}
<div class="prose prose-stone dark:prose-invert max-w-none mx-auto px-4 pb-8">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8 mb-12">
    {{ range .Pages }}
    <a href="{{ .RelPermalink }}" class="block group">
      <div class="bg-gradient-to-br from-gray-200 via-gray-300 to-emerald-100 dark:from-slate-800 dark:via-slate-700 dark:to-slate-800 p-4 rounded-lg shadow-md border border-emerald-500/50 dark:border-emerald-400/50 
        transition-all duration-300 ease-out
        hover:shadow-lg hover:shadow-emerald-500/10
        hover:-translate-y-1 hover:scale-[1.02]
        hover:border-emerald-500 dark:hover:border-emerald-400
        relative
        after:absolute after:inset-0 after:rounded-lg after:bg-gradient-to-br after:from-emerald-500/0 after:to-emerald-500/0 after:transition-colors after:duration-300
        hover:after:from-emerald-500/5 hover:after:to-emerald-500/10
        dark:hover:after:from-emerald-400/5 dark:hover:after:to-emerald-400/10">
        
        <h3 class="text-gray-900 dark:text-gray-100 mb-2 relative z-10 transition-colors duration-300 group-hover:text-emerald-800 dark:group-hover:text-emerald-300">
          {{ .Title }}
        </h3>
        {{ if .Description }}
        <p class="text-gray-700 dark:text-gray-300 text-sm relative z-10 transition-colors duration-300 group-hover:text-gray-900 dark:group-hover:text-gray-100">
          {{ .Description }}
        </p>
        {{ end }}
      </div>
    </a>
    {{ end }}
  </div>
</div>
{{ end }}
