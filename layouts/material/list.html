{{ define "main" }}
<div class="prose prose-stone dark:prose-invert max-w-none mx-auto px-4 pb-8">
  <h1>{{ .Title }}</h1>
  {{ .Content }}
  
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6 mt-8 mb-12">
    {{ range .Pages }}
    <div class="bg-gradient-to-br from-gray-200 via-gray-300 to-emerald-100 dark:from-slate-800 dark:via-slate-700 dark:to-slate-800 p-4 rounded-lg shadow-md hover:shadow-lg transition-all duration-300 border border-emerald-500/50 dark:border-emerald-400/50">
      <h3 class="text-gray-900 dark:text-gray-100 mb-2">
        <a href="{{ .RelPermalink }}" class="no-underline hover:text-emerald-700 dark:hover:text-emerald-300">
          {{ .Title }}
        </a>
      </h3>
      {{ if .Description }}
      <p class="text-gray-700 dark:text-gray-300 text-sm">{{ .Description }}</p>
      {{ end }}
    </div>
    {{ end }}
  </div>
</div>
{{ end }}
